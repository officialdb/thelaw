name: Validate site

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: validate-site-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lawyer-site-app

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_sqlite, sqlite3, xml, curl, dom, fileinfo, tokenizer, openssl
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Validate composer
        run: composer validate --no-check-all

      - name: Cache views
        run: php artisan view:cache

      - name: Show framework status
        run: php artisan about
